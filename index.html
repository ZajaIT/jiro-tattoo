<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JIRO Tattoo</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0f0f0f;
      color: white;
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    h1 {
      font-size: 42px;
      letter-spacing: 4px;
      margin-bottom: 10px;
    }

    p {
      color: #999;
      margin-bottom: 40px;
      font-size: 14px;
      letter-spacing: 2px;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .btn {
      text-decoration: none;
      color: white;
      border: 1px solid #333;
      padding: 18px;
      border-radius: 14px;
      transition: 0.25s ease;
      background: #161616;
      font-size: 16px;
      letter-spacing: 1px;
    }

    .btn:hover {
      background: white;
      color: black;
      transform: translateY(-2px);
    }

    .footer {
      margin-top: 50px;
      color: #666;
      font-size: 12px;
      letter-spacing: 1px;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>JIRO</h1>
    <p>TATTOO ARTIST</p>

    <div class="links">

      <a class="btn"
         href="https://www.instagram.com/jiro.artist/"
         target="_blank">
        Instagram
      </a>

      <a class="btn"
         href="https://www.facebook.com/jirotattoo"
         target="_blank">
        Facebook
      </a>

    </div>

    <div class="footer">
      Custom Tattoo
    </div>

  </div>

</body>
</html>
